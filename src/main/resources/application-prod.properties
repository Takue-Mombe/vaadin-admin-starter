# ============================================================
# Vaadin Admin Pro Kit — Production Configuration
# ============================================================

spring.application.name=AdminPro

# ── Server ───────────────────────────────────────────────────
server.port=${PORT:8080}

# ── Database ─────────────────────────────────────────────────
# Use managed DB in cloud by setting SPRING_DATASOURCE_* vars.
# Fallback keeps the app runnable as a demo without external DB.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:adminprodb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}

# ── JPA / Hibernate ──────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ── H2 console (disabled in production profile) ──────────────
spring.h2.console.enabled=false

# ── Vaadin ───────────────────────────────────────────────────
vaadin.productionMode=true
vaadin.devmode.liveReload.enabled=false
vaadin.allowed-packages=com.adminpro

# ── Logging ──────────────────────────────────────────────────
logging.level.com.adminpro=INFO
logging.level.org.springframework.security=WARN
