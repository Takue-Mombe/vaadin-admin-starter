# ============================================================
# Vaadin Admin Pro Kit — Application Configuration
# ============================================================

spring.application.name=AdminPro

# ── Server ───────────────────────────────────────────────────
server.port=8080

# ── H2 in-memory database ────────────────────────────────────
spring.datasource.url=jdbc:h2:mem:adminprodb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ── JPA / Hibernate ──────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ── H2 console (available at http://localhost:8080/h2-console) ──
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── Vaadin ───────────────────────────────────────────────────
# Disable Vaadin production mode in dev (set to true for production builds)
vaadin.productionMode=false
# Allow Vaadin DevTools to connect from the browser
vaadin.devmode.liveReload.enabled=true

# ── Logging ──────────────────────────────────────────────────
logging.level.com.adminpro=DEBUG
logging.level.org.springframework.security=WARN
